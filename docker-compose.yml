services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASS:-moeys_dev_pass}
      - POSTGRES_DB=${DB_NAME:-moeys}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-moeys}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--maxmemory",
        "128mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 160M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development # <-- the light dev stage, NOT production
    ports:
      - "8002:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local} # local => /docs + dev CORS enabled
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-moeys_dev_pass}
      - DB_NAME=${DB_NAME:-moeys}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY:-}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3003}
    volumes:
      - ./backend:/app # live source so --reload sees host edits
      - /app/.venv # keep the container's uv-synced venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development # <-- pnpm dev, skips the heavy pnpm build
      args:
        - API_PROXY_TARGET=${API_PROXY_TARGET:-http://backend:8000}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3003}
    init: true
    ports:
      - "3003:3003"
    environment:
      - PORT=3003 # make `next dev` bind 3003 to match the mapping
      - API_PROXY_TARGET=${API_PROXY_TARGET:-http://backend:8000}
      # Belt-and-braces: SSR code reads API_PROXY_TARGET, but keep API_URL set to
      # the same target so any path still using it resolves to the backend.
      - API_URL=${API_PROXY_TARGET:-http://backend:8000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3003}
      # - NODE_OPTIONS=--max-old-space-size=1024   # optional heap cap; raise if it OOMs
    volumes:
      - ./frontend:/app
      - /app/node_modules # keep pnpm-installed deps out of the host mount
      - /app/.next # keep dev build cache in-container (faster, cleaner)
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 768M

volumes:
  pgdata:
