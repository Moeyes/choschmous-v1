# Vault CSI provider SecretProviderClass (CHOS-201).
#
# The Kubernetes path for delivering the backend's STATIC secrets: the CSI
# driver reads them from Vault and (via secretObjects) syncs them into a native
# Kubernetes Secret the Deployment consumes with envFrom. Referenced by the
# api/worker charts in deploy/helm (CHOS-205).
#
# Dynamic Postgres credentials are NOT delivered here — they use the Vault Agent
# Injector instead (see agent-injector-annotations.yaml), which re-renders on
# lease renewal.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: moeys-backend-secrets
spec:
  provider: vault
  parameters:
    # TODO(infra): real in-cluster Vault address (e.g. the vault service DNS,
    # "https://vault.vault.svc:8200").
    vaultAddress: "https://vault.example.internal:8200"
    # Vault Kubernetes-auth role bound to the moeys-backend policy.
    roleName: "moeys-backend"
    objects: |
      - objectName: "jwt_secret_key"
        secretPath: "secret/data/moeys/backend"
        secretKey: "jwt_secret_key"
      - objectName: "jwt_refresh_secret_key"
        secretPath: "secret/data/moeys/backend"
        secretKey: "jwt_refresh_secret_key"
      - objectName: "redis_url"
        secretPath: "secret/data/moeys/backend"
        secretKey: "redis_url"
  # Sync the mounted secrets into a K8s Secret with the env-var names the backend
  # expects (config.py: JWT_SECRET_KEY, JWT_REFRESH_SECRET_KEY, REDIS_URL).
  secretObjects:
    - secretName: moeys-backend-secrets
      type: Opaque
      data:
        - objectName: "jwt_secret_key"
          key: JWT_SECRET_KEY
        - objectName: "jwt_refresh_secret_key"
          key: JWT_REFRESH_SECRET_KEY
        - objectName: "redis_url"
          key: REDIS_URL
