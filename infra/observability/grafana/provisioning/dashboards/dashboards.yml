# Grafana dashboard provisioning (CHOS-105).
# Starter dashboards live in infra/observability/grafana/dashboards/ and are
# mounted at /var/lib/grafana/dashboards by docker-compose.observability.yml;
# Grafana auto-loads them into the "MOEYS" folder.
apiVersion: 1
providers:
  - name: moeys
    orgId: 1
    folder: "MOEYS"
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
