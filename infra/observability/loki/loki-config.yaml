# Loki configuration (CHOS-204) — SCAFFOLD.
#
# Stores the backend's structured JSON logs (shipped by Promtail). Single-binary,
# filesystem storage — fine for dev / small deployments.
# TODO(CHOS-204 / infra): for production use object storage (S3/GCS) and a
# managed/replicated deployment, and set a real retention policy.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h   # 7d; TODO(infra): tune for prod
  reject_old_samples: true
  reject_old_samples_max_age: 168h

analytics:
  reporting_enabled: false
