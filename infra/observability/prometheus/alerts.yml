# Prometheus alert rules (CHOS-105) — SCAFFOLD starter rules.
# Tune thresholds to real SLOs once baseline metrics exist.
groups:
  - name: moeys-backend
    rules:
      - alert: BackendDown
        expr: up{job="moeys-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend target is down"
          description: "Prometheus cannot scrape moeys-backend for >2m."

      - alert: HighHttp5xxRate
        # >5% of requests returning 5xx over 5m.
        expr: |
          sum(rate(http_requests_total{job="moeys-backend",status=~"5.."}[5m]))
            / sum(rate(http_requests_total{job="moeys-backend"}[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Elevated 5xx error rate"
          description: "More than 5% of requests are failing with 5xx for >5m."

      - alert: HighRequestLatencyP95
        # p95 latency above 1s over 5m.
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="moeys-backend"}[5m])) by (le)
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency"
          description: "p95 request latency > 1s for >10m."

  # CHOS-105: DB / cache / host alerts (postgres-, redis-, node-exporter).
  - name: moeys-postgres
    rules:
      - alert: PostgresDown
        expr: pg_up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Postgres exporter cannot reach the database"
          description: "pg_up == 0 for >2m — DB unreachable or exporter creds wrong."

      - alert: PostgresConnectionsSaturated
        # >85% of max_connections in use over 5m.
        expr: |
          sum(pg_stat_activity_count) by (instance)
            / on(instance) pg_settings_max_connections > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connections near the limit"
          description: ">85% of max_connections in use for >5m — risk of refusals (check PgBouncer)."

      - alert: PostgresReplicationLagHigh
        # Replica apply lag > 30s.
        expr: pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres replication lag high"
          description: "Replica is >30s behind the primary for >5m."

      - alert: PostgresDeadlocksRising
        expr: rate(pg_stat_database_deadlocks[5m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Postgres deadlocks occurring"
          description: "Deadlocks detected over the last 10m — investigate contending transactions."

  - name: moeys-redis
    rules:
      - alert: RedisDown
        expr: redis_up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "redis_up == 0 for >2m — idempotency/rate-limit middleware will fail closed (503)."

      - alert: RedisMemoryNearLimit
        # >90% of maxmemory used.
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
            and redis_memory_max_bytes > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory near maxmemory"
          description: ">90% of maxmemory used for >5m — evictions imminent (allkeys-lru)."

      - alert: RedisRejectedConnections
        expr: rate(redis_rejected_connections_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis is rejecting connections"
          description: "maxclients reached — connections refused over the last 5m."

  - name: moeys-host
    rules:
      - alert: NodeDiskFillingUp
        # Root filesystem >85% full.
        expr: |
          (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}
            / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host root filesystem filling up"
          description: "Root filesystem >85% full for >10m."

      - alert: NodeHighMemoryPressure
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory pressure"
          description: ">90% of host memory in use for >10m."
