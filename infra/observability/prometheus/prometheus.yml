# Prometheus configuration (CHOS-105) — SCAFFOLD.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: prod        # TODO(CHOS-105): set per environment (uat/prod)

rule_files:
  - /etc/prometheus/alerts.yml
  # CHOS-504: SLO recording rules + multi-window multi-burn-rate alerts.
  - /etc/prometheus/slo-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI backend — /metrics is exposed by prometheus-fastapi-instrumentator.
  - job_name: moeys-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]   # service name on the compose network

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # CHOS-105: DB / cache / host exporters (see docker-compose.observability.yml).
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
