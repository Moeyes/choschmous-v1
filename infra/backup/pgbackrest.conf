# pgBackRest configuration (CHOS-103) — SCAFFOLD.
#
# pgBackRest performs full + differential + incremental backups of the moeys
# PostgreSQL cluster and supports point-in-time recovery (PITR) via WAL archiving.
#
# Secrets are NOT stored in this file. Provide S3 credentials and the backup
# encryption passphrase via environment variables / a secret manager:
#   PGBACKREST_REPO1_S3_KEY        -> repo1-s3-key
#   PGBACKREST_REPO1_S3_KEY_SECRET -> repo1-s3-key-secret
#   PGBACKREST_REPO1_CIPHER_PASS   -> repo1-cipher-pass
# TODO(CHOS-103): create the S3 bucket + IAM user and wire these secrets.

[global]
# --- Remote repository (S3-compatible object storage) --------------------
repo1-type=s3
repo1-s3-bucket=CHANGE_ME              # TODO(CHOS-103): backup bucket name
repo1-s3-endpoint=s3.amazonaws.com     # TODO(CHOS-103): set for your provider
repo1-s3-region=ap-southeast-1         # TODO(CHOS-103): set bucket region
repo1-path=/pgbackrest

# --- Retention -----------------------------------------------------------
repo1-retention-full=7                 # keep 7 full backups
repo1-retention-diff=14                # keep 14 differential backups

# --- Encryption at rest (backups are encrypted before upload) ------------
repo1-cipher-type=aes-256-cbc
# repo1-cipher-pass is injected from PGBACKREST_REPO1_CIPHER_PASS (do NOT commit)

# --- Performance ---------------------------------------------------------
compress-type=zst
compress-level=6
process-max=4
start-fast=y
delta=y

# --- Logging -------------------------------------------------------------
log-level-console=info
log-level-file=detail

[global:archive-push]
compress-level=3

# --- Stanza: the moeys cluster -------------------------------------------
[moeys]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=postgres
