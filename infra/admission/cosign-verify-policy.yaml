# CHOS-505: admission-time image-signature verification (sigstore
# policy-controller ClusterImagePolicy).
#
# This is the verification half of the cosign story whose signing half lives in
# .github/workflows/docker.yml. The policy-controller admission webhook REFUSES
# to admit a MOEYS image into the cluster unless it carries a valid keyless
# cosign signature whose certificate identity matches our GitHub Actions
# workflow (issued by Fulcio, logged in Rekor). An attacker who pushes a
# malicious image to the registry cannot get it scheduled — it was never signed
# by our workflow.
#
# TODO(infra):
#   - install sigstore policy-controller and label the moeys-* namespaces
#     `policy.sigstore.dev/include: "true"`.
#   - replace REPLACE_ME with the real GitHub org/repo in both the image glob
#     and the certificate identity regexp.
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: moeys-images-must-be-signed
spec:
  images:
    - glob: "ghcr.io/REPLACE_ME/moeys/**"
  authorities:
    - keyless:
        # Fulcio is the public-good CA that issues the short-lived signing cert.
        url: https://fulcio.sigstore.dev
        identities:
          # Only signatures whose cert was issued to OUR workflow are trusted.
          - issuer: https://token.actions.githubusercontent.com
            subjectRegExp: "https://github.com/REPLACE_ME/moeys/.github/workflows/docker.yml@refs/.*"
      ctlog:
        # Require the signature to be in the Rekor transparency log.
        url: https://rekor.sigstore.dev
