services:
  db:
    env_file:
      - uat.env
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:?set DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS:?set a strong DB_PASS}
      - POSTGRES_DB=${DB_NAME:?set DB_NAME}
    # Internal-only (CHOS-101): no host port published. Reachable by other
    # services on the compose network as `db:5432`. To connect from a laptop,
    # use an SSH tunnel (`ssh -L 5436:localhost:5432 <host>`) rather than
    # exposing Postgres to the public internet.
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASS:?set REDIS_PASS}
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    # Internal-only (CHOS-101): no host port published. Reachable on the
    # compose network as `redis:6379`.
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 160M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  pgdata:
  redisdata:
