services:
  db:
    env_file:
      - uat.env
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:?set DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS:?set a strong DB_PASS}
      - POSTGRES_DB=${DB_NAME:?set DB_NAME}
    ports:
      - "5436:5432" # publicly accessible for teammates
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASS:?set REDIS_PASS}
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "6380:6379" # expose if backend needs it remotely
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 160M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  pgdata:
  redisdata:
