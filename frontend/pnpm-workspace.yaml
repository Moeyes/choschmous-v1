confirmModulesPurge: false
# CHOS-405: the design-system package lives at packages/ui (@moeys/ui). It is
# deliberately NOT globbed in as a workspace member yet:
#
#   # packages:
#   #   - 'packages/*'
#
# Folding it in would force this workspace's `pnpm install --frozen-lockfile`
# (the main `frontend` CI job) to carry the heavy Storybook/Chromatic toolchain
# and would require regenerating the committed root lockfile. Same offline-safe
# constraint as CHOS-404's @axe-core/playwright. Until the toolchain can be added
# to the root lockfile, packages/ui is installed on its own by the dedicated
# `chromatic` CI job. Uncomment the `packages:` block above to promote it.
#
# Resilience for a slow / high-latency npm registry connection. pnpm 11 reads
# these from pnpm-workspace.yaml (camelCase); the equivalents in .npmrc were
# being ignored. Lower concurrency avoids saturating a weak link.
networkConcurrency: 4
fetchRetries: 6
fetchRetryMintimeout: 20000
fetchRetryMaxtimeout: 180000
fetchTimeout: 600000
overrides:
  '@napi-rs/wasm-runtime': 1.1.4
  'form-data@>=4.0.0 <4.0.6': '>=4.0.6'
  'undici@<7.28.0': '>=7.28.0'
  'esbuild@<0.25.0': '>=0.25.0'
  'vite@<6.4.3': '>=6.4.3'
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  msw: false
  sharp: true
  unrs-resolver: true
ignoredBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - sharp
  - unrs-resolver
