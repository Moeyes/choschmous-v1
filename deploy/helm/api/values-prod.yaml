# CHOS-205: prod overrides for moeys-api.
environment: prod
replicaCount: 3
image:
  pullPolicy: IfNotPresent
  tag: "" # pinned to an immutable release tag/digest by the Argo CD Application
config:
  ENVIRONMENT: production
  DB_HOST: REPLACE_ME-prod-pg-host
  DB_NAME: moeys
  BACKEND_CORS_ORIGINS: "https://moeys.example.gov.kh"
  WEB_CONCURRENCY: "4"
vault:
  csi:
    vaultAddress: https://vault.example.internal:8200
  agentAnnotations:
    vault.hashicorp.com/service: https://vault.example.internal:8200
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
