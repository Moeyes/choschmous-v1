# CHOS-205: staging overrides for moeys-api.
environment: staging
replicaCount: 2
image:
  tag: "staging"
config:
  ENVIRONMENT: production
  DB_HOST: REPLACE_ME-staging-pg-host
  DB_NAME: moeys
  BACKEND_CORS_ORIGINS: "https://staging.moeys.example.gov.kh"
  WEB_CONCURRENCY: "4"
vault:
  csi:
    vaultAddress: https://vault-staging.example.internal:8200
  agentAnnotations:
    vault.hashicorp.com/service: https://vault-staging.example.internal:8200
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
