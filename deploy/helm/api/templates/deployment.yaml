apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moeys-api.fullname" . }}
  labels:
    {{- include "moeys-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "moeys-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when the non-secret config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.vault.enabled }}
        {{- /* CHOS-201: Vault Agent Injector — dynamic Postgres creds. */}}
        {{- toYaml .Values.vault.agentAnnotations | nindent 8 }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "moeys-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "moeys-api.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Source the Vault Agent-rendered dynamic DB creds (CHOS-201) before
          # launching uvicorn; JWT_*/REDIS_URL arrive via envFrom (CSI secret).
          command:
            - sh
            - -c
            - |
              if [ -f /vault/secrets/db.env ]; then set -a; . /vault/secrets/db.env; set +a; fi
              exec uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${WEB_CONCURRENCY:-2}
          envFrom:
            - configMapRef:
                name: {{ include "moeys-api.fullname" . }}-config
            {{- if .Values.vault.enabled }}
            - secretRef:
                name: {{ .Values.vault.csi.secretProviderClassName }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.vault.enabled }}
          volumeMounts:
            # Mounting the CSI volume is what triggers the SecretProviderClass to
            # sync the static secrets into the K8s Secret consumed above.
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- end }}
      {{- if .Values.vault.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.vault.csi.secretProviderClassName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
