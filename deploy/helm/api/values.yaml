# CHOS-205: default values for the MOEYS backend API chart. Per-environment
# overrides live in values-<env>.yaml. Nothing secret is set here — secrets come
# from Vault (CHOS-201) via the CSI provider + Agent Injector.

# Environment name, surfaced to the app as ENVIRONMENT and used in labels.
environment: dev

replicaCount: 2

image:
  # TODO(infra): real registry/repo (matches .github/workflows/docker.yml output).
  repository: ghcr.io/REPLACE_ME/moeys/backend
  pullPolicy: IfNotPresent
  tag: "" # defaults to .Chart.AppVersion when empty

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  # TODO(infra): IRSA / workload-identity annotation if pulling cloud resources.
  annotations: {}

service:
  type: ClusterIP
  port: 8000

# Non-secret runtime config → ConfigMap → env. Connection coordinates come from
# the terraform outputs (CHOS-205); override per env.
config:
  ENVIRONMENT: dev
  DB_HOST: REPLACE_ME-pg-host
  DB_PORT: "5432"
  DB_NAME: moeys
  # BACKEND_CORS_ORIGINS etc. set per-env.
  BACKEND_CORS_ORIGINS: ""
  WEB_CONCURRENCY: "2"

# Vault wiring (CHOS-201).
vault:
  enabled: true
  # CSI provider: static secrets (JWT_*/REDIS_URL) synced into a K8s Secret that
  # the pod consumes via envFrom. Mirrors infra/vault/k8s/secretproviderclass.yaml.
  csi:
    secretProviderClassName: moeys-backend-secrets
    # TODO(infra): real in-cluster Vault address + k8s-auth role.
    vaultAddress: https://vault.example.internal:8200
    roleName: moeys-backend
  # Agent Injector: DYNAMIC Postgres creds rendered to /vault/secrets/db.env and
  # sourced at startup. Mirrors infra/vault/k8s/agent-injector-annotations.yaml.
  agentAnnotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: moeys-backend
    vault.hashicorp.com/service: https://vault.example.internal:8200
    vault.hashicorp.com/agent-inject-secret-db.env: database/creds/moeys-backend
    vault.hashicorp.com/agent-inject-template-db.env: |
      {{- with secret "database/creds/moeys-backend" -}}
      export DB_USER={{ .Data.username }}
      export DB_PASS={{ .Data.password }}
      {{- end -}}

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
