# CHOS-205: uat overrides for moeys-workers.
environment: uat
replicaCount: 2
image:
  tag: "uat"
config:
  ENVIRONMENT: production
  DB_HOST: REPLACE_ME-uat-pg-host
  DB_NAME: moeys
  ARQ_REDIS_URL: "redis://REPLACE_ME-uat-broker-host:6379/0"
vault:
  csi:
    vaultAddress: https://vault-uat.example.internal:8200
  agentAnnotations:
    vault.hashicorp.com/service: https://vault-uat.example.internal:8200
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
