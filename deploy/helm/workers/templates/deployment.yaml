apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moeys-workers.fullname" . }}
  labels:
    {{- include "moeys-workers.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "moeys-workers.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.vault.enabled }}
        {{- toYaml .Values.vault.agentAnnotations | nindent 8 }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "moeys-workers.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "moeys-workers.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Source Vault Agent-rendered dynamic DB creds (CHOS-201), then run the
          # arq worker. JWT_*/REDIS_URL come via envFrom (CSI secret).
          command:
            - sh
            - -c
            - |
              if [ -f /vault/secrets/db.env ]; then set -a; . /vault/secrets/db.env; set +a; fi
              exec arq {{ .Values.worker.module }}
          envFrom:
            - configMapRef:
                name: {{ include "moeys-workers.fullname" . }}-config
            {{- if .Values.vault.enabled }}
            - secretRef:
                name: {{ .Values.vault.csi.secretProviderClassName }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.vault.enabled }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          {{- end }}
      {{- if .Values.vault.enabled }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.vault.csi.secretProviderClassName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
