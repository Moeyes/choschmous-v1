# CHOS-205: prod overrides for moeys-bff.
environment: prod
replicaCount: 3
image:
  tag: "" # pinned to an immutable release tag/digest by the Argo CD Application
config:
  NODE_ENV: production
  PORT: "3003"
  API_PROXY_TARGET: "http://moeys-api:8000"
  API_URL: "http://moeys-api:8000"
resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    memory: 768Mi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65
