[project]
name = "backend-v2"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "alembic==1.18.4",
    "asyncpg==0.31.0",
    "bcrypt==4.0.1",
    "cloudinary==1.44.1",
    "faker==40.11.1",
    "fastapi==0.138.0",
    "passlib[bcrypt]==1.7.4",
    "psycopg2-binary==2.9.11",
    "pydantic-settings==2.14.2",
    "pydantic[email]==2.12.5",
    "pyjwt==2.13.0",
    "python-dotenv==1.2.2",
    "python-multipart==0.0.31",
    "idna>=3.15",
    "urllib3>=2.7.0",
    "redis[hiredis]==8.0.0",
    "sentry-sdk==2.54.0",
    "sqlalchemy==2.0.48",
    # Security pin: starlette<1.3.1 has several CVEs (multipart DoS, etc.).
    # fastapi pulls it transitively; this lower bound forces the patched line.
    "starlette>=1.3.1",
    "uvicorn[standard]==0.41.0",
    "openpyxl==3.1.5",
    "weasyprint==68.0",
    # CHOS-202: arq (Redis-backed) job queue for off-request-path report rendering.
    "arq==0.25.0",
]

[dependency-groups]
dev = [
    "httpx==0.28.1",
    "locust==2.44.1",
    "msgpack>=1.2.1",
    "pytest==9.0.3",
    "pytest-asyncio==1.4.0",
    "ruff==0.14.4",
]

[tool.ruff]
line-length = 88
target-version = "py314"
# Alembic revisions are autogenerated; linting/formatting them is churn for no
# gain (and they legitimately carry unused imports + long DDL lines).
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
# Pragmatic first-adoption set: pyflakes (real bugs: unused/undefined names,
# redefinitions) + pycodestyle errors/warnings. E402 (import-not-at-top) and
# E501 (line length) are intentionally off: the codebase has legitimate
# post-`sys.path` / conditional imports, and line length is owned by the
# formatter. Tighten with "I", "B", "UP" once the team is ready.
select = ["E", "F", "W"]
ignore = ["E402", "E501"]

[tool.ruff.lint.per-file-ignores]
# Barrel modules re-export names for the public package API; those imports look
# "unused" to pyflakes but are the whole point of the file.
"**/__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_test_loop_scope = "session"
asyncio_default_fixture_loop_scope = "session"
