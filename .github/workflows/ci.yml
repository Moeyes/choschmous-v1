name: CI

# Automated quality gate: backend tests (Postgres + Redis) and frontend
# lint/test/build. Runs on every push and PR.
#
# NOTE: first run may need minor tuning to the runner (e.g. the Python version
# availability for setup-uv). Validate on the first push.

on:
  push:
    branches: ["**"]
  pull_request:

# Supersede in-flight runs for the same branch/PR — only the latest push matters.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moeys_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DB_USER: postgres
      DB_PASS: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: moeys_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: local
      # Test-only secrets (≥32 chars to satisfy the boot-time validator).
      JWT_SECRET_KEY: ci-test-secret-key-not-for-production-0001
      JWT_REFRESH_SECRET_KEY: ci-test-refresh-secret-not-for-prod-0002
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Bootstrap database schema
        run: uv run python scripts/init_db_schema.py
      - name: Run tests
        run: uv run pytest -q

  openapi-contract:
    name: Backend (OpenAPI contract)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # The schema is generated from the app object, not a running server, so no
    # Postgres/Redis services are needed. The env below only has to satisfy the
    # boot-time config validator (required secrets per CHOS-201).
    env:
      ENVIRONMENT: local
      DB_USER: postgres
      DB_PASS: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: moeys_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-openapi-secret-key-not-for-production-001
      JWT_REFRESH_SECRET_KEY: ci-openapi-refresh-secret-not-for-prod-002
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Export OpenAPI contract
        run: uv run python scripts/export_openapi.py openapi.json
      - name: Upload OpenAPI contract artifact
        uses: actions/upload-artifact@v7
        with:
          name: openapi-contract
          path: backend/openapi.json
          if-no-files-found: error

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      # Read the pinned pnpm from the `packageManager` field in
      # frontend/package.json (currently pnpm@11.7.0) — the same version corepack
      # installs in the Dockerfile. `package_json_file` is required because
      # action-setup runs from the repo root (there is no root package.json), and
      # `working-directory` only affects `run:` steps. pnpm 9 cannot install this
      # project: the lockfile and pnpm-workspace.yaml overrides are pnpm-11 format.
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
      # Dead-code report. Advisory (non-blocking): knip currently flags a backlog
      # of unused exports/types and can be noisy on work-in-progress modules.
      # Flip `continue-on-error` to false once the backlog is burned down to make
      # it a hard gate that keeps the tree clean.
      - name: Dead-code check (knip)
        run: pnpm knip
        continue-on-error: true
