name: CodeQL

# Static security analysis for the two languages in this repo. Catches injection,
# auth, and data-handling bugs — relevant for an app that stores participant PII.
# Runs on PRs, on pushes to main, and on a weekly schedule so newly-published
# CodeQL queries also catch already-merged code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

# Cancel a stale analysis when a branch is pushed again.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          # `languages` (plural) is the correct input; `build-mode: none` skips
          # the build step — both languages here are interpreted (no compilation).
          languages: ${{ matrix.language }}
          build-mode: none
          # `security-and-quality` is broader than the default `security`; drop
          # to `security-extended` if quality findings prove too noisy.
          queries: security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
