name: Docker

# Builds the production images that actually ship (docker-compose deploy path).
# A broken Dockerfile — WeasyPrint native libs, the corepack/pnpm setup, the
# baked API proxy target — would otherwise only surface at deploy time.
#
#   * Pull requests        → build only (validation), no push.
#   * Push to main / tags  → build AND push to GHCR. This is the CD foundation:
#                            the deploy host just pulls these tags.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker.yml"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR via the built-in GITHUB_TOKEN — no extra secrets
      id-token: write # CHOS-505: OIDC token for cosign keyless (Fulcio/Rekor) signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            target: production
          - name: frontend
            context: frontend
            target: production
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only authenticate when we intend to push (not on PRs from forks, which
      # cannot receive a write token anyway).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          # The frontend bakes the API proxy destination at build time; the
          # compose default (service name `backend`) is correct for the image.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # CHOS-505: sign the pushed image with cosign KEYLESS (no long-lived key).
      # The GitHub OIDC token is exchanged at Fulcio for a short-lived cert; the
      # signature + cert are logged in the Rekor transparency log. The deploy /
      # admission side verifies provenance against the workflow identity — see
      # SECURITY.md and infra/admission/cosign-verify-policy.yaml.
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        # Sign by immutable digest (never a mutable tag) so the signature is
        # bound to exactly the bytes that were built.
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
